<svg viewBox="0 0 1200 675" xmlns="http://www.w3.org/2000/svg">
<defs>
  <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="675" gradientUnits="userSpaceOnUse">
    <stop offset="0%" stop-color="#0b1929"/>
    <stop offset="100%" stop-color="#14283f"/>
  </linearGradient>
  <radialGradient id="glow1" cx="1000" cy="120" r="380" gradientUnits="userSpaceOnUse">
    <stop offset="0%" stop-color="#c9922a" stop-opacity="0.24"/>
    <stop offset="100%" stop-color="#c9922a" stop-opacity="0"/>
  </radialGradient>
  <radialGradient id="glow2" cx="200" cy="600" r="300" gradientUnits="userSpaceOnUse">
    <stop offset="0%" stop-color="#3b82f6" stop-opacity="0.12"/>
    <stop offset="100%" stop-color="#3b82f6" stop-opacity="0"/>
  </radialGradient>
  <linearGradient id="card1" x1="0" y1="0" x2="0" y2="1" gradientUnits="objectBoundingBox">
    <stop offset="0%" stop-color="#1a3654"/>
    <stop offset="100%" stop-color="#0d2236"/>
  </linearGradient>
  <linearGradient id="card2" x1="0" y1="0" x2="0" y2="1" gradientUnits="objectBoundingBox">
    <stop offset="0%" stop-color="#112030"/>
    <stop offset="100%" stop-color="#0a1828"/>
  </linearGradient>
  <filter id="blur1">
    <feGaussianBlur stdDeviation="40"/>
  </filter>
</defs>

<!-- Background -->
<rect width="1200" height="675" fill="url(#bg)"/>
<rect width="1200" height="675" fill="url(#glow1)"/>
<rect width="1200" height="675" fill="url(#glow2)"/>

<!-- Subtle grid -->
<g opacity="0.055" stroke="#6a9bbf" stroke-width="1">
  <line x1="0" y1="135" x2="1200" y2="135"/>
  <line x1="0" y1="270" x2="1200" y2="270"/>
  <line x1="0" y1="405" x2="1200" y2="405"/>
  <line x1="0" y1="540" x2="1200" y2="540"/>
  <line x1="240" y1="0" x2="240" y2="675"/>
  <line x1="480" y1="0" x2="480" y2="675"/>
  <line x1="720" y1="0" x2="720" y2="675"/>
  <line x1="960" y1="0" x2="960" y2="675"/>
</g>

<!-- Left fade for text readability -->
<linearGradient id="lf" x1="0" y1="0" x2="1" y2="0" gradientUnits="objectBoundingBox">
  <stop offset="0%" stop-color="#0b1929" stop-opacity="0.75"/>
  <stop offset="100%" stop-color="#0b1929" stop-opacity="0"/>
</linearGradient>
<rect width="520" height="675" fill="url(#lf)"/>

<!-- Decorative circle behind cards -->
<circle cx="760" cy="340" r="280" fill="none" stroke="#2a4f72" stroke-width="1" opacity="0.2"/>
<circle cx="760" cy="340" r="220" fill="none" stroke="#2a4f72" stroke-width="1" opacity="0.15"/>

<!-- Main dashboard card -->
<rect x="480" y="120" width="410" height="290" rx="20" fill="url(#card1)" stroke="#223d5a" stroke-width="1.5" opacity="0.97"/>

<!-- Card top bar -->
<rect x="480" y="120" width="410" height="48" rx="20" fill="#1e3f60"/>
<rect x="480" y="146" width="410" height="22" fill="#1e3f60"/>

<!-- Traffic lights -->
<circle cx="507" cy="144" r="5" fill="#ef4444" opacity="0.7"/>
<circle cx="524" cy="144" r="5" fill="#f59e0b" opacity="0.7"/>
<circle cx="541" cy="144" r="5" fill="#22c55e" opacity="0.7"/>

<!-- Card label -->
<rect x="562" y="138" width="110" height="7" rx="3.5" fill="#ffffff" opacity="0.35"/>
<rect x="562" y="152" width="70" height="5" rx="2.5" fill="#6a9bbf" opacity="0.35"/>

<!-- Metric box 1: OTP delivery 9.1s → 2.3s -->
<rect x="498" y="185" width="170" height="88" rx="12" fill="url(#card2)" stroke="#1e3d5c" stroke-width="1"/>
<rect x="514" y="199" width="90" height="5.5" rx="2.75" fill="#5b8db8" opacity="0.55"/>
<rect x="514" y="212" width="44" height="7" rx="3.5" fill="#3d6a8a" opacity="0.55"/>
<line x1="514" y1="215.5" x2="558" y2="215.5" stroke="#3d6a8a" stroke-width="1.5" opacity="0.65"/>
<rect x="514" y="228" width="72" height="18" rx="5" fill="#c9922a" opacity="0.9"/>
<rect x="514" y="254" width="110" height="5" rx="2.5" fill="#3d6a8a" opacity="0.35"/>

<!-- Metric box 2: 98.4% delivery rate -->
<rect x="682" y="185" width="170" height="88" rx="12" fill="url(#card2)" stroke="#1e3d5c" stroke-width="1"/>
<rect x="698" y="199" width="100" height="5.5" rx="2.75" fill="#5b8db8" opacity="0.55"/>
<rect x="698" y="228" width="64" height="18" rx="5" fill="#22c55e" opacity="0.8"/>
<rect x="698" y="254" width="85" height="5" rx="2.5" fill="#3d6a8a" opacity="0.35"/>

<!-- Chart area -->
<rect x="498" y="286" width="354" height="100" rx="12" fill="url(#card2)" stroke="#1e3d5c" stroke-width="1"/>
<!-- Chart bars improving over time -->
<rect x="516" y="346" width="18" height="28" rx="3" fill="#2a4f72" opacity="0.7"/>
<rect x="542" y="338" width="18" height="36" rx="3" fill="#2a4f72" opacity="0.7"/>
<rect x="568" y="328" width="18" height="46" rx="3" fill="#3d6a8a" opacity="0.7"/>
<rect x="594" y="318" width="18" height="56" rx="3" fill="#4a7a9b" opacity="0.75"/>
<rect x="620" y="308" width="18" height="66" rx="3" fill="#c9922a" opacity="0.7"/>
<rect x="646" y="298" width="18" height="76" rx="3" fill="#c9922a" opacity="0.8"/>
<rect x="672" y="292" width="18" height="82" rx="3" fill="#d4a853" opacity="0.85"/>
<rect x="698" y="288" width="18" height="86" rx="3" fill="#d4a853" opacity="0.9"/>
<rect x="724" y="287" width="18" height="87" rx="3" fill="#22c55e" opacity="0.8"/>
<rect x="750" y="286.5" width="18" height="87.5" rx="3" fill="#22c55e" opacity="0.85"/>
<rect x="776" y="286.5" width="18" height="87.5" rx="3" fill="#22c55e" opacity="0.9"/>
<!-- Baseline -->
<line x1="516" y1="374" x2="818" y2="374" stroke="#2a4f72" stroke-width="1" opacity="0.5"/>

<!-- Secondary card (right side, offset behind) -->
<rect x="760" y="90" width="280" height="120" rx="16" fill="url(#card2)" stroke="#1a3350" stroke-width="1" opacity="0.88"/>
<rect x="780" y="112" width="110" height="6" rx="3" fill="#5b8db8" opacity="0.4"/>
<rect x="780" y="130" width="60" height="20" rx="10" fill="#c9922a" opacity="0.85"/>
<rect x="850" y="130" width="50" height="20" rx="10" fill="#1e3f60" opacity="0.9"/>
<rect x="780" y="162" width="200" height="4" rx="2" fill="#1e3f60" opacity="0.8"/>
<rect x="780" y="170" width="240" height="4" rx="2" fill="#1e3f60" opacity="0.6"/>
<rect x="780" y="178" width="180" height="4" rx="2" fill="#1e3f60" opacity="0.4"/>

<!-- Small notification card -->
<rect x="860" y="440" width="200" height="80" rx="14" fill="url(#card1)" stroke="#223d5a" stroke-width="1" opacity="0.85"/>
<circle cx="884" cy="464" r="10" fill="#22c55e" opacity="0.85"/>
<rect x="902" y="458" width="100" height="6" rx="3" fill="#ffffff" opacity="0.45"/>
<rect x="902" y="470" width="70" height="5" rx="2.5" fill="#5b8db8" opacity="0.4"/>
<rect x="880" y="490" width="160" height="5" rx="2.5" fill="#1e3f60" opacity="0.7"/>
<rect x="880" y="500" width="120" height="5" rx="2.5" fill="#1e3f60" opacity="0.5"/>

<!-- Left side label text -->
<rect x="80" y="230" width="180" height="8" rx="4" fill="#ffffff" opacity="0.25"/>
<rect x="80" y="250" width="260" height="8" rx="4" fill="#ffffff" opacity="0.18"/>
<rect x="80" y="270" width="220" height="8" rx="4" fill="#ffffff" opacity="0.12"/>
<rect x="80" y="320" width="80" height="4" rx="2" fill="#c9922a" opacity="0.4"/>

<!-- Accent line -->
<rect x="80" y="330" width="220" height="1.5" rx="1" fill="#c9922a" opacity="0.3"/>

<!-- Floating dots decoration -->
<circle cx="1100" cy="580" r="3" fill="#c9922a" opacity="0.4"/>
<circle cx="1120" cy="570" r="2" fill="#c9922a" opacity="0.25"/>
<circle cx="1090" cy="595" r="1.5" fill="#c9922a" opacity="0.2"/>
<circle cx="1140" cy="555" r="4" fill="#2a4f72" opacity="0.4"/>
<circle cx="1155" cy="600" r="2.5" fill="#2a4f72" opacity="0.3"/>
</svg>
