<svg viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg">
<defs>
  <linearGradient id="bg" x1="0" y1="0" x2="400" y2="400" gradientUnits="userSpaceOnUse">
    <stop offset="0%" stop-color="#1a4a30"/>
    <stop offset="100%" stop-color="#0e2b1c"/>
  </linearGradient>
  <radialGradient id="glow" cx="150" cy="120" r="220" gradientUnits="userSpaceOnUse">
    <stop offset="0%" stop-color="#f59e0b" stop-opacity="0.2"/>
    <stop offset="100%" stop-color="#f59e0b" stop-opacity="0"/>
  </radialGradient>
  <linearGradient id="sil" x1="0" y1="0" x2="0" y2="400" gradientUnits="userSpaceOnUse">
    <stop offset="0%" stop-color="#2d6a48"/>
    <stop offset="100%" stop-color="#1a4a30"/>
  </linearGradient>
</defs>
<circle cx="200" cy="200" r="200" fill="url(#bg)"/>
<circle cx="200" cy="200" r="200" fill="url(#glow)"/>
<!-- Silhouette: shoulders (slightly wider neckline for kurta) -->
<path d="M 0 400 Q 80 285 145 268 Q 172 294 200 300 Q 228 294 255 268 Q 320 285 400 400 Z" fill="url(#sil)" opacity="0.92"/>
<!-- Silhouette: head -->
<ellipse cx="200" cy="186" rx="66" ry="76" fill="url(#sil)" opacity="0.92"/>
<!-- Warm studio daylight highlight -->
<radialGradient id="hl" cx="160" cy="150" r="90" gradientUnits="userSpaceOnUse">
  <stop offset="0%" stop-color="#f59e0b" stop-opacity="0.16"/>
  <stop offset="100%" stop-color="#f59e0b" stop-opacity="0"/>
</radialGradient>
<circle cx="200" cy="200" r="200" fill="url(#hl)"/>
<!-- Emerald accent ring -->
<circle cx="200" cy="200" r="196" fill="none" stroke="#3d9970" stroke-width="2" opacity="0.45"/>
</svg>
