<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0b1220"/>
      <stop offset="100%" style="stop-color:#0f1e35"/>
    </linearGradient>
    <radialGradient id="glow1" cx="80%" cy="20%" r="50%">
      <stop offset="0%" style="stop-color:#0891b2;stop-opacity:0.3"/>
      <stop offset="100%" style="stop-color:#0891b2;stop-opacity:0"/>
    </radialGradient>
    <radialGradient id="glow2" cx="10%" cy="80%" r="45%">
      <stop offset="0%" style="stop-color:#2563eb;stop-opacity:0.2"/>
      <stop offset="100%" style="stop-color:#2563eb;stop-opacity:0"/>
    </radialGradient>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#glow1)"/>
  <rect width="1200" height="630" fill="url(#glow2)"/>

  <!-- Grid lines -->
  <g stroke="#ffffff" stroke-opacity="0.04" stroke-width="1">
    <line x1="0" y1="105" x2="1200" y2="105"/>
    <line x1="0" y1="210" x2="1200" y2="210"/>
    <line x1="0" y1="315" x2="1200" y2="315"/>
    <line x1="0" y1="420" x2="1200" y2="420"/>
    <line x1="0" y1="525" x2="1200" y2="525"/>
    <line x1="200" y1="0" x2="200" y2="630"/>
    <line x1="400" y1="0" x2="400" y2="630"/>
    <line x1="600" y1="0" x2="600" y2="630"/>
    <line x1="800" y1="0" x2="800" y2="630"/>
    <line x1="1000" y1="0" x2="1000" y2="630"/>
  </g>

  <!-- Phone with X / warning icon -->
  <rect x="100" y="170" width="90" height="150" rx="14" fill="none" stroke="#0891b2" stroke-opacity="0.6" stroke-width="2"/>
  <rect x="110" y="185" width="70" height="110" rx="6" fill="#0891b2" fill-opacity="0.1"/>
  <circle cx="145" cy="300" r="6" fill="#0891b2" fill-opacity="0.6"/>
  <!-- X mark inside screen -->
  <line x1="128" y1="220" x2="162" y2="254" stroke="#f87171" stroke-width="3" stroke-linecap="round"/>
  <line x1="162" y1="220" x2="128" y2="254" stroke="#f87171" stroke-width="3" stroke-linecap="round"/>

  <!-- Warning triangle -->
  <polygon points="145,160 168,200 122,200" fill="#fbbf24" fill-opacity="0.9"/>
  <text x="145" y="196" font-family="system-ui,-apple-system,sans-serif" font-size="18" font-weight="700" fill="#0b1220" text-anchor="middle">!</text>

  <!-- Category pill -->
  <rect x="80" y="350" width="165" height="32" rx="16" fill="#0891b2" fill-opacity="0.15" stroke="#0891b2" stroke-opacity="0.4" stroke-width="1"/>
  <text x="162" y="371" font-family="system-ui,-apple-system,sans-serif" font-size="13" font-weight="600" fill="#67e8f9" text-anchor="middle" letter-spacing="2">TROUBLESHOOTING</text>

  <!-- Title -->
  <text x="80" y="435" font-family="system-ui,-apple-system,sans-serif" font-size="50" font-weight="700" fill="#ffffff" letter-spacing="-1">Telegram Code</text>
  <text x="80" y="493" font-family="system-ui,-apple-system,sans-serif" font-size="50" font-weight="700" fill="#ffffff" letter-spacing="-1">Not Arriving via SMS?</text>
  <text x="80" y="543" font-family="system-ui,-apple-system,sans-serif" font-size="26" font-weight="400" fill="#94a3b8">Fix It — India Guide 2026</text>

  <!-- SMSLocal branding -->
  <text x="80" y="600" font-family="system-ui,-apple-system,sans-serif" font-size="18" font-weight="600" fill="#0891b2">SMSLocal</text>
  <text x="190" y="600" font-family="system-ui,-apple-system,sans-serif" font-size="18" fill="#475569">· smslocal.in/blog</text>

  <!-- Right: OTP digit boxes -->
  <rect x="840" y="245" width="58" height="70" rx="10" fill="#0891b2" fill-opacity="0.2" stroke="#0891b2" stroke-opacity="0.5" stroke-width="1.5"/>
  <text x="869" y="295" font-family="monospace" font-size="36" font-weight="700" fill="#67e8f9" text-anchor="middle">?</text>

  <rect x="912" y="245" width="58" height="70" rx="10" fill="#0891b2" fill-opacity="0.2" stroke="#0891b2" stroke-opacity="0.5" stroke-width="1.5"/>
  <text x="941" y="295" font-family="monospace" font-size="36" font-weight="700" fill="#67e8f9" text-anchor="middle">?</text>

  <rect x="984" y="245" width="58" height="70" rx="10" fill="#0891b2" fill-opacity="0.2" stroke="#0891b2" stroke-opacity="0.5" stroke-width="1.5"/>
  <text x="1013" y="295" font-family="monospace" font-size="36" font-weight="700" fill="#67e8f9" text-anchor="middle">?</text>

  <rect x="1056" y="245" width="58" height="70" rx="10" fill="#0891b2" fill-opacity="0.2" stroke="#0891b2" stroke-opacity="0.5" stroke-width="1.5"/>
  <text x="1085" y="295" font-family="monospace" font-size="36" font-weight="700" fill="#67e8f9" text-anchor="middle">?</text>

  <rect x="1128" y="245" width="58" height="70" rx="10" fill="#0891b2" fill-opacity="0.2" stroke="#0891b2" stroke-opacity="0.5" stroke-width="1.5"/>
  <text x="1157" y="295" font-family="monospace" font-size="36" font-weight="700" fill="#67e8f9" text-anchor="middle">?</text>

  <!-- Explanation text -->
  <text x="1013" y="360" font-family="system-ui,-apple-system,sans-serif" font-size="14" fill="#475569" text-anchor="middle">5-digit code not received</text>
</svg>
