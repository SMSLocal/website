<svg viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a"/>
      <stop offset="100%" style="stop-color:#0d1f2d"/>
    </linearGradient>
    <linearGradient id="glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0ea5e9;stop-opacity:0.15"/>
      <stop offset="100%" style="stop-color:#0f172a;stop-opacity:0"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>
  <ellipse cx="920" cy="130" rx="400" ry="300" fill="url(#glow)"/>

  <!-- Globe / cloud receiving SMS icon -->
  <g transform="translate(800, 90)">
    <!-- Globe circle -->
    <circle cx="170" cy="170" r="140" fill="none" stroke="#0ea5e9" stroke-width="2" opacity="0.4"/>
    <circle cx="170" cy="170" r="140" fill="#0f1f33" opacity="0.8"/>
    <!-- Globe grid lines -->
    <ellipse cx="170" cy="170" rx="70" ry="140" fill="none" stroke="#0ea5e9" stroke-width="1.5" opacity="0.25"/>
    <ellipse cx="170" cy="170" rx="120" ry="140" fill="none" stroke="#0ea5e9" stroke-width="1" opacity="0.15"/>
    <line x1="30" y1="170" x2="310" y2="170" stroke="#0ea5e9" stroke-width="1.5" opacity="0.25"/>
    <line x1="170" y1="30" x2="170" y2="310" stroke="#0ea5e9" stroke-width="1.5" opacity="0.2"/>
    <ellipse cx="170" cy="120" rx="140" ry="50" fill="none" stroke="#0ea5e9" stroke-width="1" opacity="0.2"/>
    <ellipse cx="170" cy="220" rx="140" ry="50" fill="none" stroke="#0ea5e9" stroke-width="1" opacity="0.2"/>
    <!-- SMS arrow descending onto globe -->
    <path d="M170 10 l0 80" stroke="#38bdf8" stroke-width="3" stroke-dasharray="6 4" stroke-linecap="round"/>
    <polygon points="170,100 158,78 182,78" fill="#38bdf8"/>
    <!-- Small message bubble at top -->
    <rect x="130" y="-35" width="80" height="40" rx="8" fill="#0ea5e9" opacity="0.9"/>
    <polygon points="155,5 165,5 160,18" fill="#0ea5e9" opacity="0.9"/>
    <rect x="143" y="-24" width="54" height="6" rx="3" fill="#fff" opacity="0.8"/>
    <rect x="143" y="-12" width="38" height="6" rx="3" fill="#fff" opacity="0.5"/>
  </g>

  <!-- Category pill -->
  <rect x="80" y="110" width="115" height="32" rx="16" fill="#0ea5e9" fill-opacity="0.12" stroke="#0ea5e9" stroke-width="1" stroke-opacity="0.4"/>
  <text x="137" y="130" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="700" letter-spacing="2" fill="#38bdf8" opacity="0.85">CONSUMER</text>

  <!-- Title -->
  <text x="80" y="218" font-family="Arial, sans-serif" font-size="50" font-weight="800" fill="#f8fafc" letter-spacing="-1">Receive SMS Online</text>
  <text x="80" y="275" font-family="Arial, sans-serif" font-size="50" font-weight="800" fill="#f8fafc" letter-spacing="-1">in India</text>
  <text x="80" y="330" font-family="Arial, sans-serif" font-size="28" font-weight="400" fill="#94a3b8">Legitimate Uses, Tradeoffs</text>
  <text x="80" y="367" font-family="Arial, sans-serif" font-size="28" font-weight="400" fill="#94a3b8">and Better Alternatives</text>

  <line x1="80" y1="405" x2="300" y2="405" stroke="#0ea5e9" stroke-width="2" opacity="0.5"/>

  <text x="80" y="575" font-family="Arial, sans-serif" font-size="16" font-weight="700" fill="#475569" letter-spacing="1">SMSLocal.in</text>
</svg>
