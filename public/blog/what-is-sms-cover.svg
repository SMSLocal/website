<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0b1220"/>
      <stop offset="100%" style="stop-color:#0f1e35"/>
    </linearGradient>
    <radialGradient id="glow1" cx="80%" cy="20%" r="50%">
      <stop offset="0%" style="stop-color:#2563eb;stop-opacity:0.35"/>
      <stop offset="100%" style="stop-color:#2563eb;stop-opacity:0"/>
    </radialGradient>
    <radialGradient id="glow2" cx="10%" cy="85%" r="45%">
      <stop offset="0%" style="stop-color:#0ea5e9;stop-opacity:0.25"/>
      <stop offset="100%" style="stop-color:#0ea5e9;stop-opacity:0"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#glow1)"/>
  <rect width="1200" height="630" fill="url(#glow2)"/>

  <!-- Grid lines -->
  <g stroke="#ffffff" stroke-opacity="0.04" stroke-width="1">
    <line x1="0" y1="105" x2="1200" y2="105"/>
    <line x1="0" y1="210" x2="1200" y2="210"/>
    <line x1="0" y1="315" x2="1200" y2="315"/>
    <line x1="0" y1="420" x2="1200" y2="420"/>
    <line x1="0" y1="525" x2="1200" y2="525"/>
    <line x1="200" y1="0" x2="200" y2="630"/>
    <line x1="400" y1="0" x2="400" y2="630"/>
    <line x1="600" y1="0" x2="600" y2="630"/>
    <line x1="800" y1="0" x2="800" y2="630"/>
    <line x1="1000" y1="0" x2="1000" y2="630"/>
  </g>

  <!-- SMS bubble icon -->
  <rect x="80" y="200" width="140" height="95" rx="16" fill="#2563eb" fill-opacity="0.9"/>
  <polygon points="100,295 80,330 130,295" fill="#2563eb" fill-opacity="0.9"/>
  <rect x="100" y="222" width="80" height="8" rx="4" fill="#ffffff" fill-opacity="0.9"/>
  <rect x="100" y="242" width="100" height="8" rx="4" fill="#ffffff" fill-opacity="0.7"/>
  <rect x="100" y="262" width="60" height="8" rx="4" fill="#ffffff" fill-opacity="0.5"/>

  <!-- Category pill -->
  <rect x="80" y="140" width="155" height="32" rx="16" fill="#2563eb" fill-opacity="0.18" stroke="#2563eb" stroke-opacity="0.4" stroke-width="1"/>
  <text x="157" y="161" font-family="system-ui,-apple-system,sans-serif" font-size="13" font-weight="600" fill="#93c5fd" text-anchor="middle" letter-spacing="2">GETTING STARTED</text>

  <!-- Title -->
  <text x="80" y="390" font-family="system-ui,-apple-system,sans-serif" font-size="56" font-weight="700" fill="#ffffff" letter-spacing="-1">What Is SMS?</text>
  <text x="80" y="460" font-family="system-ui,-apple-system,sans-serif" font-size="32" font-weight="400" fill="#94a3b8">How Text Messaging Works</text>
  <text x="80" y="506" font-family="system-ui,-apple-system,sans-serif" font-size="32" font-weight="400" fill="#94a3b8">and Why It Still Matters in 2026</text>

  <!-- SMSLocal branding -->
  <text x="80" y="590" font-family="system-ui,-apple-system,sans-serif" font-size="18" font-weight="600" fill="#2563eb">SMSLocal</text>
  <text x="190" y="590" font-family="system-ui,-apple-system,sans-serif" font-size="18" fill="#475569">· smslocal.in/blog</text>

  <!-- Right decorative element: signal waves -->
  <circle cx="980" cy="315" r="60" fill="none" stroke="#2563eb" stroke-opacity="0.3" stroke-width="2"/>
  <circle cx="980" cy="315" r="110" fill="none" stroke="#2563eb" stroke-opacity="0.18" stroke-width="1.5"/>
  <circle cx="980" cy="315" r="165" fill="none" stroke="#2563eb" stroke-opacity="0.1" stroke-width="1"/>
  <circle cx="980" cy="315" r="225" fill="none" stroke="#2563eb" stroke-opacity="0.06" stroke-width="1"/>
  <circle cx="980" cy="315" r="30" fill="#2563eb" fill-opacity="0.2"/>
  <circle cx="980" cy="315" r="12" fill="#2563eb" fill-opacity="0.8"/>
</svg>
