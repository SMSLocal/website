<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0b1220"/>
      <stop offset="100%" style="stop-color:#0f1e35"/>
    </linearGradient>
    <radialGradient id="glow1" cx="78%" cy="18%" r="50%">
      <stop offset="0%" style="stop-color:#7c3aed;stop-opacity:0.28"/>
      <stop offset="100%" style="stop-color:#7c3aed;stop-opacity:0"/>
    </radialGradient>
    <radialGradient id="glow2" cx="12%" cy="82%" r="45%">
      <stop offset="0%" style="stop-color:#2563eb;stop-opacity:0.22"/>
      <stop offset="100%" style="stop-color:#2563eb;stop-opacity:0"/>
    </radialGradient>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#glow1)"/>
  <rect width="1200" height="630" fill="url(#glow2)"/>

  <!-- Grid lines -->
  <g stroke="#ffffff" stroke-opacity="0.04" stroke-width="1">
    <line x1="0" y1="105" x2="1200" y2="105"/>
    <line x1="0" y1="210" x2="1200" y2="210"/>
    <line x1="0" y1="315" x2="1200" y2="315"/>
    <line x1="0" y1="420" x2="1200" y2="420"/>
    <line x1="0" y1="525" x2="1200" y2="525"/>
    <line x1="200" y1="0" x2="200" y2="630"/>
    <line x1="400" y1="0" x2="400" y2="630"/>
    <line x1="600" y1="0" x2="600" y2="630"/>
    <line x1="800" y1="0" x2="800" y2="630"/>
    <line x1="1000" y1="0" x2="1000" y2="630"/>
  </g>

  <!-- Star / award icon -->
  <polygon points="145,170 158,210 200,210 168,235 180,275 145,252 110,275 122,235 90,210 132,210" fill="#7c3aed" fill-opacity="0.7" stroke="#a78bfa" stroke-opacity="0.6" stroke-width="1.5"/>

  <!-- Category pill -->
  <rect x="80" y="300" width="115" height="32" rx="16" fill="#7c3aed" fill-opacity="0.18" stroke="#7c3aed" stroke-opacity="0.4" stroke-width="1"/>
  <text x="137" y="321" font-family="system-ui,-apple-system,sans-serif" font-size="13" font-weight="600" fill="#c4b5fd" text-anchor="middle" letter-spacing="2">CONSUMER</text>

  <!-- Title -->
  <text x="80" y="400" font-family="system-ui,-apple-system,sans-serif" font-size="54" font-weight="700" fill="#ffffff" letter-spacing="-1">Best Free SMS Apps</text>
  <text x="80" y="460" font-family="system-ui,-apple-system,sans-serif" font-size="34" font-weight="400" fill="#94a3b8">in India 2026:</text>
  <text x="80" y="506" font-family="system-ui,-apple-system,sans-serif" font-size="34" font-weight="400" fill="#94a3b8">Compared by Use Case</text>

  <!-- SMSLocal branding -->
  <text x="80" y="590" font-family="system-ui,-apple-system,sans-serif" font-size="18" font-weight="600" fill="#7c3aed">SMSLocal</text>
  <text x="190" y="590" font-family="system-ui,-apple-system,sans-serif" font-size="18" fill="#475569">· smslocal.in/blog</text>

  <!-- Right decoration: ranked list bars -->
  <rect x="860" y="200" width="260" height="44" rx="8" fill="#7c3aed" fill-opacity="0.5"/>
  <text x="875" y="229" font-family="system-ui,-apple-system,sans-serif" font-size="16" font-weight="700" fill="#e9d5ff">#1  Operator bundled SMS</text>

  <rect x="860" y="260" width="220" height="44" rx="8" fill="#7c3aed" fill-opacity="0.32"/>
  <text x="875" y="289" font-family="system-ui,-apple-system,sans-serif" font-size="16" font-weight="600" fill="#c4b5fd">#2  SMSLocal free trial</text>

  <rect x="860" y="320" width="180" height="44" rx="8" fill="#7c3aed" fill-opacity="0.18"/>
  <text x="875" y="349" font-family="system-ui,-apple-system,sans-serif" font-size="16" font-weight="500" fill="#a78bfa">#3  WhatsApp</text>

  <rect x="860" y="380" width="140" height="44" rx="8" fill="#7c3aed" fill-opacity="0.1"/>
  <text x="875" y="409" font-family="system-ui,-apple-system,sans-serif" font-size="16" font-weight="400" fill="#7c5cc4">#4  Third-party apps</text>
</svg>
