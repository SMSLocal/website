<svg viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a"/>
      <stop offset="100%" style="stop-color:#1a1a2e"/>
    </linearGradient>
    <linearGradient id="glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ef4444;stop-opacity:0.15"/>
      <stop offset="100%" style="stop-color:#0f172a;stop-opacity:0"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>
  <ellipse cx="920" cy="120" rx="400" ry="300" fill="url(#glow)"/>

  <!-- Phone with DND / mute icon -->
  <g transform="translate(810, 110)">
    <!-- Phone body -->
    <rect x="0" y="0" width="200" height="330" rx="22" fill="#1e293b" stroke="#334155" stroke-width="2"/>
    <rect x="12" y="40" width="176" height="250" rx="4" fill="#0f172a"/>
    <!-- Notch -->
    <rect x="70" y="8" width="60" height="14" rx="7" fill="#0f172a"/>
    <!-- DND circle (red blocked) -->
    <circle cx="100" cy="162" r="72" fill="#1a0a0a" stroke="#ef4444" stroke-width="4"/>
    <line x1="49" y1="111" x2="151" y2="213" stroke="#ef4444" stroke-width="6" stroke-linecap="round"/>
    <!-- Bell icon inside -->
    <path d="M85 145 q0-15 15-15 t15 15 v20 h-30 z" fill="#ef4444" opacity="0.4"/>
    <path d="M100 178 q6 0 6 -6 h-12 q0 6 6 6 z" fill="#ef4444" opacity="0.4"/>
    <!-- Status bar dots -->
    <circle cx="55" cy="310" r="5" fill="#475569"/>
    <circle cx="100" cy="310" r="5" fill="#ef4444"/>
    <circle cx="145" cy="310" r="5" fill="#475569"/>
  </g>

  <!-- Category pill -->
  <rect x="80" y="110" width="115" height="32" rx="16" fill="#ef4444" fill-opacity="0.12" stroke="#ef4444" stroke-width="1" stroke-opacity="0.4"/>
  <text x="137" y="130" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="700" letter-spacing="2" fill="#ef4444" opacity="0.85">CONSUMER</text>

  <!-- Title -->
  <text x="80" y="220" font-family="Arial, sans-serif" font-size="72" font-weight="800" fill="#f8fafc" letter-spacing="-2">DND Means</text>
  <text x="80" y="290" font-family="Arial, sans-serif" font-size="32" font-weight="400" fill="#94a3b8">What It Is, How to Activate,</text>
  <text x="80" y="333" font-family="Arial, sans-serif" font-size="32" font-weight="400" fill="#94a3b8">and What It Actually Blocks</text>

  <line x1="80" y1="375" x2="320" y2="375" stroke="#ef4444" stroke-width="2" opacity="0.5"/>
  <text x="80" y="400" font-family="Arial, sans-serif" font-size="17" fill="#64748b">Jio · Airtel · Vi · BSNL</text>

  <text x="80" y="575" font-family="Arial, sans-serif" font-size="16" font-weight="700" fill="#475569" letter-spacing="1">SMSLocal.in</text>
</svg>
