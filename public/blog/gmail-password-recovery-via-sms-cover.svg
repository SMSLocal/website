<svg viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a"/>
      <stop offset="100%" style="stop-color:#18122b"/>
    </linearGradient>
    <linearGradient id="glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#a855f7;stop-opacity:0.15"/>
      <stop offset="100%" style="stop-color:#0f172a;stop-opacity:0"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>
  <ellipse cx="930" cy="130" rx="380" ry="280" fill="url(#glow)"/>

  <!-- Lock + envelope icon -->
  <g transform="translate(820, 100)">
    <!-- Envelope body -->
    <rect x="10" y="100" width="280" height="200" rx="12" fill="#1e1b33" stroke="#7c3aed" stroke-width="2"/>
    <!-- Envelope flap lines -->
    <line x1="10" y1="100" x2="150" y2="190" stroke="#7c3aed" stroke-width="2" opacity="0.5"/>
    <line x1="290" y1="100" x2="150" y2="190" stroke="#7c3aed" stroke-width="2" opacity="0.5"/>
    <!-- Gmail-style M shape -->
    <path d="M40 240 l0 -80 l110 60 l110 -60 l0 80" stroke="#a855f7" stroke-width="3" fill="none" stroke-linejoin="round" opacity="0.6"/>
    <!-- Lock overlaid -->
    <rect x="108" y="30" width="84" height="72" rx="8" fill="#0f172a" stroke="#a855f7" stroke-width="2.5"/>
    <path d="M130 30 q0-36 20-36 t20 36" fill="none" stroke="#a855f7" stroke-width="2.5" stroke-linecap="round"/>
    <circle cx="150" cy="66" r="10" fill="#a855f7" opacity="0.9"/>
    <rect x="146" y="66" width="8" height="14" rx="2" fill="#a855f7" opacity="0.9"/>
  </g>

  <!-- Category pill -->
  <rect x="80" y="110" width="105" height="32" rx="16" fill="#a855f7" fill-opacity="0.12" stroke="#a855f7" stroke-width="1" stroke-opacity="0.4"/>
  <text x="132" y="130" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="700" letter-spacing="2" fill="#c084fc" opacity="0.85">SECURITY</text>

  <!-- Title -->
  <text x="80" y="215" font-family="Arial, sans-serif" font-size="50" font-weight="800" fill="#f8fafc" letter-spacing="-1">Gmail Password</text>
  <text x="80" y="272" font-family="Arial, sans-serif" font-size="50" font-weight="800" fill="#f8fafc" letter-spacing="-1">Recovery via SMS</text>
  <text x="80" y="326" font-family="Arial, sans-serif" font-size="27" font-weight="400" fill="#94a3b8">How It Works, Common Failures</text>
  <text x="80" y="362" font-family="Arial, sans-serif" font-size="27" font-weight="400" fill="#94a3b8">and Security Tips</text>

  <line x1="80" y1="400" x2="300" y2="400" stroke="#a855f7" stroke-width="2" opacity="0.5"/>
  <text x="80" y="425" font-family="Arial, sans-serif" font-size="16" fill="#64748b">SIM-swap protection · Account recovery</text>

  <text x="80" y="575" font-family="Arial, sans-serif" font-size="16" font-weight="700" fill="#475569" letter-spacing="1">SMSLocal.in</text>
</svg>
