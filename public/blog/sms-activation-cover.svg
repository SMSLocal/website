<svg viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a"/>
      <stop offset="100%" style="stop-color:#1a2030"/>
    </linearGradient>
    <linearGradient id="glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#22c55e;stop-opacity:0.16"/>
      <stop offset="100%" style="stop-color:#0f172a;stop-opacity:0"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>
  <ellipse cx="940" cy="130" rx="380" ry="280" fill="url(#glow)"/>

  <!-- Phone + SIM card icon -->
  <g transform="translate(810, 90)">
    <!-- Phone -->
    <rect x="20" y="0" width="200" height="340" rx="22" fill="#1e293b" stroke="#334155" stroke-width="2"/>
    <rect x="32" y="44" width="176" height="252" rx="4" fill="#0f172a"/>
    <rect x="84" y="12" width="72" height="14" rx="7" fill="#0f172a"/>
    <!-- Screen content: signal bars -->
    <rect x="60" y="100" width="20" height="40" rx="3" fill="#22c55e" opacity="0.4"/>
    <rect x="90" y="80" width="20" height="60" rx="3" fill="#22c55e" opacity="0.6"/>
    <rect x="120" y="60" width="20" height="80" rx="3" fill="#22c55e" opacity="0.8"/>
    <rect x="150" y="40" width="20" height="100" rx="3" fill="#22c55e" opacity="1"/>
    <!-- "SMS Active" label on screen -->
    <rect x="55" y="165" width="130" height="28" rx="6" fill="#22c55e" opacity="0.15"/>
    <text x="120" y="183" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="700" fill="#22c55e">SMS ACTIVE</text>
    <!-- Home button area -->
    <circle cx="120" cy="320" r="10" fill="#334155"/>
  </g>

  <!-- SIM card floating next to phone -->
  <g transform="translate(1040, 230)">
    <rect x="0" y="0" width="80" height="100" rx="8" fill="#0f2744" stroke="#22c55e" stroke-width="2" opacity="0.8"/>
    <polygon points="0,0 20,0 0,20" fill="#0f172a"/>
    <rect x="10" y="26" width="60" height="8" rx="2" fill="#334155"/>
    <rect x="10" y="40" width="60" height="8" rx="2" fill="#334155"/>
    <rect x="10" y="54" width="40" height="8" rx="2" fill="#334155"/>
    <text x="40" y="85" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#22c55e" opacity="0.7">SIM</text>
  </g>

  <!-- Category pill -->
  <rect x="80" y="110" width="160" height="32" rx="16" fill="#22c55e" fill-opacity="0.10" stroke="#22c55e" stroke-width="1" stroke-opacity="0.4"/>
  <text x="160" y="130" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="700" letter-spacing="2" fill="#4ade80" opacity="0.85">TROUBLESHOOTING</text>

  <!-- Title -->
  <text x="80" y="218" font-family="Arial, sans-serif" font-size="52" font-weight="800" fill="#f8fafc" letter-spacing="-1">SMS Not Working</text>
  <text x="80" y="278" font-family="Arial, sans-serif" font-size="52" font-weight="800" fill="#f8fafc" letter-spacing="-1">on Your Phone?</text>
  <text x="80" y="332" font-family="Arial, sans-serif" font-size="28" font-weight="400" fill="#94a3b8">Activation &amp; Troubleshooting</text>
  <text x="80" y="370" font-family="Arial, sans-serif" font-size="28" font-weight="400" fill="#94a3b8">Guide for India 2026</text>

  <line x1="80" y1="408" x2="300" y2="408" stroke="#22c55e" stroke-width="2" opacity="0.5"/>
  <text x="80" y="433" font-family="Arial, sans-serif" font-size="16" fill="#64748b">Settings · SMSC · Carrier · OTP</text>

  <text x="80" y="575" font-family="Arial, sans-serif" font-size="16" font-weight="700" fill="#475569" letter-spacing="1">SMSLocal.in</text>
</svg>
