<svg viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a"/>
      <stop offset="100%" style="stop-color:#1e293b"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f59e0b"/>
      <stop offset="100%" style="stop-color:#d97706"/>
    </linearGradient>
    <linearGradient id="glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f59e0b;stop-opacity:0.18"/>
      <stop offset="100%" style="stop-color:#0f172a;stop-opacity:0"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>
  <ellipse cx="900" cy="100" rx="420" ry="320" fill="url(#glow)"/>

  <!-- Document stack icon -->
  <g transform="translate(820, 140)">
    <!-- back doc -->
    <rect x="30" y="30" width="200" height="260" rx="6" fill="#1e3a5f" stroke="#334155" stroke-width="1.5"/>
    <!-- mid doc -->
    <rect x="16" y="16" width="200" height="260" rx="6" fill="#1e3a5f" stroke="#334155" stroke-width="1.5"/>
    <!-- front doc -->
    <rect x="0" y="0" width="200" height="260" rx="6" fill="#0f2744" stroke="#475569" stroke-width="1.5"/>
    <!-- lines on front doc -->
    <rect x="20" y="36" width="80" height="8" rx="3" fill="#f59e0b" opacity="0.9"/>
    <rect x="20" y="56" width="160" height="6" rx="3" fill="#475569"/>
    <rect x="20" y="72" width="140" height="6" rx="3" fill="#475569"/>
    <rect x="20" y="88" width="155" height="6" rx="3" fill="#475569"/>
    <rect x="20" y="116" width="120" height="6" rx="3" fill="#334155"/>
    <rect x="20" y="132" width="155" height="6" rx="3" fill="#334155"/>
    <rect x="20" y="148" width="100" height="6" rx="3" fill="#334155"/>
    <!-- stamp circle -->
    <circle cx="148" cy="210" r="32" fill="none" stroke="#f59e0b" stroke-width="3" opacity="0.8"/>
    <circle cx="148" cy="210" r="22" fill="none" stroke="#f59e0b" stroke-width="1.5" opacity="0.4"/>
    <text x="148" y="215" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="700" fill="#f59e0b" opacity="0.9">DLT</text>
  </g>

  <!-- Checkmark badge -->
  <circle cx="1060" cy="390" r="36" fill="#f59e0b" opacity="0.15"/>
  <circle cx="1060" cy="390" r="28" fill="none" stroke="#f59e0b" stroke-width="2.5" opacity="0.6"/>
  <path d="M1047 390 l9 9 l18 -18" stroke="#f59e0b" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round" opacity="0.9"/>

  <!-- Category pill -->
  <rect x="80" y="110" width="130" height="32" rx="16" fill="#f59e0b" fill-opacity="0.12" stroke="#f59e0b" stroke-width="1" stroke-opacity="0.4"/>
  <text x="145" y="130" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="700" letter-spacing="2" fill="#f59e0b" opacity="0.85">COMPLIANCE</text>

  <!-- Title -->
  <text x="80" y="215" font-family="Arial, sans-serif" font-size="58" font-weight="800" fill="#f8fafc" letter-spacing="-1">DLT Registration</text>
  <text x="80" y="285" font-family="Arial, sans-serif" font-size="34" font-weight="400" fill="#94a3b8">The Practical Guide for</text>
  <text x="80" y="330" font-family="Arial, sans-serif" font-size="34" font-weight="400" fill="#94a3b8">Indian Businesses 2026</text>

  <!-- Subtitle line -->
  <line x1="80" y1="375" x2="340" y2="375" stroke="#f59e0b" stroke-width="2" opacity="0.5"/>
  <text x="80" y="400" font-family="Arial, sans-serif" font-size="17" fill="#64748b">PE · Header · Template · Consent</text>

  <!-- SMSLocal brand -->
  <text x="80" y="575" font-family="Arial, sans-serif" font-size="16" font-weight="700" fill="#475569" letter-spacing="1">SMSLocal.in</text>
</svg>
